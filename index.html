<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive CAD Parts Viewer</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260612-transparent-viewer" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <div id="viewer" class="viewer" aria-label="Interactive 3D CAD viewer"></div>
        <aside id="drawer" class="drawer" aria-label="Part details">
          <div class="drawer-empty">
            <p class="eyebrow">Part Details</p>
            <h2>Select a part</h2>
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=20260612-transparent-viewer"></script>
  </body>
</html>
